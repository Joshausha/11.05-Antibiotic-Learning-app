name: Content Quality Check

on:
  schedule:
    # Run weekly on Mondays at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    paths:
      - 'src/data/**'

jobs:
  medical-content-validation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate medical data files
      run: |
        echo "🩺 Medical Content Quality Check"
        echo "================================"

        # Verify all data files exist
        echo ""
        echo "📁 Checking data files..."
        for file in quizQuestions pathogens antibiotics conditions; do
          if [ -f "src/data/${file}.js" ]; then
            echo "✅ src/data/${file}.js exists"
          else
            echo "⚠️ src/data/${file}.js not found"
          fi
        done

    - name: Analyze quiz content
      run: |
        echo ""
        echo "📊 Quiz Content Analysis"
        echo "========================"

        node -e "
        const fs = require('fs');

        // Count questions in quizQuestions.js
        if (fs.existsSync('./src/data/quizQuestions.js')) {
          const content = fs.readFileSync('./src/data/quizQuestions.js', 'utf8');
          const questionMatches = content.match(/question:/g) || [];
          console.log('Total quiz questions:', questionMatches.length);

          const explanationMatches = content.match(/explanation:/g) || [];
          console.log('Questions with explanations:', explanationMatches.length);

          const difficultyMatches = content.match(/difficulty:/g) || [];
          console.log('Questions with difficulty levels:', difficultyMatches.length);
        }
        "

    - name: Run Jest tests
      run: |
        echo ""
        echo "🧪 Running Test Suite"
        echo "===================="
        npm test -- --coverage --watchAll=false --passWithNoTests 2>&1 | tail -30 || true

    - name: Generate quality summary
      run: |
        echo ""
        echo "📋 Quality Check Summary"
        echo "========================"
        echo "Repository: ${{ github.repository }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "Run date: $(date)"
        echo ""
        echo "✅ Quality check completed"
